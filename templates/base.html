<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>{% block title %}포켓몬 도감{% endblock %}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gamja+Flower&family=Do+Hyeon&family=Gugi&display=swap" rel="stylesheet">

  <style>
    .type-badge {
      display: inline-block;
      padding: 0.2rem 0.45rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 8px;
      color: white;
      margin-right: 3px;
      margin-bottom: 3px;
    }

    /* 타입별 색상 */
    .type-grass   { background-color: #78C850; }
    .type-fire    { background-color: #F08030; }
    .type-water   { background-color: #6890F0; }
    .type-bug     { background-color: #A8B820; }
    .type-poison  { background-color: #A040A0; }
    .type-flying  { background-color: #A890F0; }
    .type-normal  { background-color: #A8A878; }
    .type-electric { background-color: #F8D030; color: black; }
    .type-fighting { background-color: #C03028; color: white; }
    .type-steel { background-color: #B8B8D0; color: black; }

    .filter-btn {
      border-radius: 8px !important;
      font-weight: 600;
      transition: 0.15s;
    }

    /* active 상태일 때 더 확실하게 칠해지도록 */
    .filter-btn.active.filter-all {
      background-color: #6c757d !important;
      border-color: #6c757d !important;
      color: white !important;
    }

    .filter-btn.active.filter-owned {
      background-color: #198754 !important;
      border-color: #198754 !important;
      color: white !important;
    }

    .filter-btn.active.filter-unowned {
      background-color: #ffc107 !important;
      border-color: #ffc107 !important;
      color: black !important;
    }

    /* 전체 배경 살짝 그라데이션 */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f3f4ff, #e0f7ff);
    }

    /* 로그인 카드, 도감 카드에 살짝 둥글둥글 + 그림자 */
    .soft-card {
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    /* 포켓몬 카드 이미지 높이 줄이기 */
    .pokemon-card-img {
      max-height: 90px;
      object-fit: contain;
      padding: 0.5rem;
    }

    /* 포켓몬 카드 자체 크기 / 여백 조정 */
    .pokemon-card {
      border-radius: 0.9rem;
      box-shadow: 0 8px 18px rgba(0,0,0,0.05);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .pokemon-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
    }
    .pokemon-card .card-body {
      padding: 0.6rem 0.8rem;
    }
    .pokemon-card .card-title {
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
    }
    .pokemon-card .card-text {
      font-size: 0.8rem;
      margin-bottom: 0.3rem;
    }
    .pokemon-card .badge {
      font-size: 0.7rem;
    }
    .pokemon-card .card-footer {
      padding: 0.4rem 0.6rem 0.6rem;
    }
    .pokemon-card button {
      font-size: 0.75rem;
      padding: 0.3rem 0.4rem;
    }

    /* 로그인 화면용 라벨 */
    .logo-text {
      font-weight: 800;
      letter-spacing: 2px;
    }
    .subtitle-text {
      color: #6c757d;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('pokedex') }}">
    <img src="/static/images/pokemon_logo.png" alt="Pokémon Logo" height="36">
    </a>
    <div class="ms-auto">
      {% if session.username %}
        <span class="text-light me-2"
          style="font-family: 'Jua', sans-serif;">
          {{ session.username }} 의 도감
        </span>
        <a class="btn btn-outline-light btn-sm" href="{{ url_for('logout') }}">로그아웃</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container pb-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ 'danger' if category=='error' else category }} alert-dismissible fade show" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
